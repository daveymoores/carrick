name: "Carrick"
description: "Add a TypeScript service to your Carrick org index, queryable by AI coding agents over MCP."

branding:
  icon: "link"
  color: "blue"

inputs:
  path:
    description: "Path to analyze"
    required: false
    default: "."

outputs:
  success:
    description: "Analysis completed successfully"
    value: ${{ steps.analysis.outputs.success }}
  issues-found:
    description: "Number of API issues detected"
    value: ${{ steps.analysis.outputs.issues-found }}

runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "24"

    - name: Download Carrick
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        DOWNLOAD_URL=$(gh api repos/daveymoores/carrick/releases/latest --jq '.assets[] | select(.name=="carrick-action-linux.tar.gz") | .browser_download_url')
        curl -L -o carrick-action.tar.gz "$DOWNLOAD_URL"
        tar -xzf carrick-action.tar.gz
        chmod +x carrick

    - name: Install ts_check dependencies
      shell: bash
      run: cd ts_check && npm ci

    - name: Install sidecar dependencies
      shell: bash
      run: cd sidecar && npm ci

    - name: Run analysis
      id: analysis
      shell: bash
      env:
        # Auth is keyless: the scanner mints a GitHub Actions OIDC token from
        # ACTIONS_ID_TOKEN_REQUEST_URL / ACTIONS_ID_TOKEN_REQUEST_TOKEN (present
        # automatically when the job grants `permissions: id-token: write`) and
        # sends it as X-Carrick-OIDC. No API key required.
        CI: "true"
      run: |
        set +e
        ./carrick ${{ inputs.path }} > analysis.log 2>&1
        EXIT_CODE=$?
        set -e

        ISSUES=0
        if grep -q "CARRICK_ISSUE_COUNT:" analysis.log; then
          ISSUES=$(grep "CARRICK_ISSUE_COUNT:" analysis.log | sed 's/.*CARRICK_ISSUE_COUNT:\([0-9]*\).*/\1/')
        fi

        if [ $EXIT_CODE -eq 0 ]; then
          echo "success=true" >> $GITHUB_OUTPUT
        else
          echo "success=false" >> $GITHUB_OUTPUT
        fi

        echo "issues-found=$ISSUES" >> $GITHUB_OUTPUT

        # PR comments are posted by the Carrick GitHub App from the cloud, not
        # by this workflow: on pull_request runs the scanner relays the
        # rendered findings to api.carrick.tools, which upserts one marked
        # comment (gated on the project's pr_comments_enabled toggle). No
        # github-script step or pull-requests:write permission is needed here.

        cat analysis.log
        exit $EXIT_CODE
