name: OIDC keyless smoke test

# Verifies the keyless-upload producer contract against the LIVE cloud on a
# real GitHub Actions runner: mints a real OIDC token (audience
# https://api.carrick.tools) and calls the upload endpoint with X-Carrick-OIDC.
# Uses only the non-destructive `check-or-upload` presence check (it stores
# nothing). Scoped to the feature branch; convert to workflow_dispatch or drop
# before merging to main.
on:
  push:
    branches: [feat/oidc-keyless-upload]

permissions:
  id-token: write
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Mint OIDC token and call the live cloud
        env:
          AUDIENCE: "https://api.carrick.tools"
          ENDPOINT: "https://api.carrick.tools/types/check-or-upload"
        run: |
          set -euo pipefail

          # 1) Mint the OIDC token exactly as the scanner does.
          TOKEN=$(curl -sS \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE" | jq -r '.value')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Failed to mint OIDC token from the runner"
            exit 1
          fi
          echo "✅ Minted OIDC token (${#TOKEN} chars)"

          # Best-effort: print the non-secret claims so we can confirm aud + repo
          # identity are what the cloud will derive. Never print the token itself.
          PAYLOAD=$(printf '%s' "$TOKEN" | cut -d. -f2 | tr '_-' '/+')
          case $(( ${#PAYLOAD} % 4 )) in 2) PAYLOAD="$PAYLOAD==";; 3) PAYLOAD="$PAYLOAD=";; esac
          echo "Claims: $(printf '%s' "$PAYLOAD" | base64 -d 2>/dev/null \
            | jq -c '{aud, repository, repository_id, sub}' 2>/dev/null || echo '<unparsed>')"

          # 2) Call the live upload endpoint with X-Carrick-OIDC. `check-or-upload`
          #    is a presence check — it persists nothing.
          HTTP=$(curl -sS -o /tmp/body.txt -w '%{http_code}' -X POST "$ENDPOINT" \
            -H "X-Carrick-OIDC: $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"action":"check-or-upload","repo":"health","hash":"health-check","filename":"health.ts"}')
          echo "Cloud responded HTTP $HTTP"
          echo "Body: $(cat /tmp/body.txt)"

          # 2xx => keyless auth accepted and identity derived from OIDC claims.
          # 401/403 => the OIDC token reached the app and was parsed, but the repo
          #            isn't provisioned/connected (still proves the producer
          #            contract; flags the remaining dashboard-side setup).
          # 5xx     => real failure.
          if [ "$HTTP" -ge 500 ]; then
            echo "::error::Cloud returned a server error for the keyless request"
            exit 1
          fi
          if [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ]; then
            echo "✅ Live keyless upload-auth accepted (HTTP $HTTP)"
          else
            echo "::warning::OIDC token was accepted by the gateway but the request \
              returned HTTP $HTTP — the auth plumbing works; check repo/project provisioning."
          fi
