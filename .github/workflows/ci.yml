name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            examples/express-single/package.json
            tests/fixtures/imported-routers/package.json
            tests/fixtures/fastify-api/package.json
            tests/fixtures/koa-api/package.json
            src/sidecar/package-lock.json
            ts_check/package-lock.json

      - name: Install test dependencies
        run: |
          cd examples/express-single && npm install
          cd ../../tests/fixtures/imported-routers && npm install
          cd ../fastify-api && npm install
          cd ../koa-api && npm install

      - name: Build sidecar
        run: cd src/sidecar && npm ci && npm run build

      - name: Run output contract tests
        run: cargo test --test output_contract_test --verbose

      - name: Run MockStorage tests
        run: cargo test --test mock_storage_test --verbose

      - name: Run dependency analysis tests
        run: cargo test --test dependency_analysis_test --verbose

      - name: Run integration tests
        run: cargo test --test integration_test --verbose

      - name: Run file-centric analysis tests
        run: cargo test --test file_centric_analysis_test --verbose

      - name: Run sidecar integration tests
        run: cargo test --test sidecar_integration_test --verbose

      - name: Run URL alias matching tests
        run: cargo test --test url_alias_matching_test --verbose

      - name: Run cassette hard gate
        run: cargo test --test llm_cassette_hard_gate_test --verbose

      - name: Run xrepo harness test
        run: cargo test --test xrepo_harness_test --verbose

      # Cross-repo scorer math only. Default `cargo test` skips the #[ignore]d
      # live scorer + mock smoke (both spawn the binary / cost money), so this is
      # cheap, deterministic, and never triggers a scan. The live scorer runs via
      # eval-xrepo.yml (workflow_dispatch), NOT here.
      - name: Run cross-repo scorer unit tests
        run: cargo test --test eval_xrepo --verbose

      - name: Run sidecar unit tests
        run: cd src/sidecar && npm test

      - name: Run ts_check unit tests
        run: cd ts_check && npm ci && npm test

      - name: Run library tests
        run: cargo test --lib --verbose

      # Workspace members are NOT covered by the steps above: this is a
      # non-virtual workspace, so plain `cargo test` invocations only run the
      # root package. Every member crate needs its own explicit step.
      - name: Run carrick-match tests
        run: cargo test -p carrick-match --verbose

  wasm-match:
    name: carrick-match wasm smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      - name: Build carrick-match for wasm32
        run: cargo build --target wasm32-unknown-unknown -p carrick-match --features wasm --release

      # Version must match the exact wasm-bindgen pin in
      # crates/carrick-match/Cargo.toml; bump both in lockstep.
      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      - name: Generate Node.js glue
        run: wasm-bindgen --target nodejs --out-dir target/wasm-smoke target/wasm32-unknown-unknown/release/carrick_match.wasm

      # Smoke only: proves the glue loads and the exports answer correctly
      # under Node. The artifact is not uploaded; the committed copy consumed
      # by carrick-cloud is produced and pinned separately.
      - name: Load glue in Node and assert matching
        run: |
          node -e "
            const assert = require('assert');
            const m = require('./target/wasm-smoke/carrick_match.js');
            assert.strictEqual(m.paths_match('/users/:id', '/users/123'), true);
            assert.strictEqual(m.paths_match('/users/123', '/users/:id'), true);
            assert.strictEqual(m.paths_match('/api/**', '/api/users/123/orders'), true);
            assert.strictEqual(m.paths_match('/users', '/orders'), false);
            assert.strictEqual(m.is_param_segment(':id'), true);
            assert.strictEqual(m.is_param_segment('users'), false);
            console.log('wasm smoke ok');
          "

  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --verbose

      - name: Build release
        run: cargo build --release --verbose

  endpoint-regression-test:
    name: Endpoint Detection Regression Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install express-single example dependencies
        run: cd examples/express-single && npm install

      - name: Install imported-routers test dependencies
        run: cd tests/fixtures/imported-routers && npm install

      - name: Build sidecar
        run: cd src/sidecar && npm ci && npm run build

      - name: Build carrick
        run: cargo build --release

      - name: Test basic endpoint detection (express-single)
        env:
          CARRICK_MOCK_ALL: "true"
        run: |
          mkdir -p examples/express-single/output
          ./target/release/carrick ./examples/express-single/ > examples/express-single/output/test_output.txt 2>&1
          echo "=== express-single output ==="
          cat examples/express-single/output/test_output.txt
          # Check that we find the expected 3 endpoints
          if ! grep -q "Indexed \*\*3 endpoints\*\*" examples/express-single/output/test_output.txt; then
            echo "ERROR: Expected to find 3 endpoints in examples/express-single"
            exit 1
          fi
          echo "✅ Basic endpoint detection working correctly"

      - name: Test imported router resolution
        env:
          CARRICK_MOCK_ALL: "true"
        run: |
          mkdir -p tests/fixtures/imported-routers/output
          ./target/release/carrick ./tests/fixtures/imported-routers/ > tests/fixtures/imported-routers/output/test_output.txt 2>&1
          echo "=== Imported routers test output ==="
          cat tests/fixtures/imported-routers/output/test_output.txt
          # Check that we don't have the regression bug
          if grep -q "Unique endpoint paths: 0" tests/fixtures/imported-routers/output/test_output.txt; then
            echo "ERROR: Found 'Unique endpoint paths: 0' - imported router resolution bug has regressed!"
            exit 1
          fi
          # Check that we find a reasonable number of endpoints (at least 10)
          if ! grep -E "Indexed \*\*[0-9]+ endpoints\*\*" tests/fixtures/imported-routers/output/test_output.txt; then
            echo "ERROR: Expected to find some endpoints in imported router test, but found none"
            exit 1
          fi
          ENDPOINT_COUNT=$(grep -E "Indexed \*\*[0-9]+ endpoints\*\*" tests/fixtures/imported-routers/output/test_output.txt | sed -E 's/.*Indexed \*\*([0-9]+) endpoints\*\*.*/\1/')
          if [ "$ENDPOINT_COUNT" -lt 10 ]; then
            echo "ERROR: Expected at least 10 endpoints, but found $ENDPOINT_COUNT"
            exit 1
          fi
          echo "✅ Imported router resolution working correctly"
          echo "✅ Imported router resolution working correctly ($ENDPOINT_COUNT endpoints found)"

      - name: Upload test outputs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-outputs
          path: |
            examples/express-single/output/test_output.txt
            tests/fixtures/imported-routers/output/test_output.txt

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit
