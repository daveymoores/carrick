name: Carrick

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [carrick-sibling-updated]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  carrick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: daveymoores/carrick@v1
