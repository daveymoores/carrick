name: eval-tier-a

# Evals plan, Slice 1: scores endpoint/call precision/recall/F1 for the Tier-A
# framework fixtures against their expected.json, and prints a report.
#
# On-demand only (workflow_dispatch) — each run makes real LLM calls that cost a
# few cents. Auth is GitHub Actions OIDC: the scanner is keyless, so this needs
# `id-token: write` and no stored secret. The job's OIDC identity resolves
# (repo -> App installation -> workspace) entirely on the cloud side, so it is
# independent of any personal Carrick account.
on:
  workflow_dispatch:
    inputs:
      runs:
        description: "N repeated scans per fixture (variance / pass^k sample size)"
        required: false
        default: "5"
      capture:
        description: "Dump raw file-analyzer input/output per run for prompt diagnosis"
        type: boolean
        required: false
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  eval-tier-a:
    name: Tier-A extraction quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            src/sidecar/package-lock.json

      - name: Build type sidecar
        run: cd src/sidecar && npm ci && npm run build

      - name: Install fixture dependencies
        run: |
          for f in koa-api fastify-api hapi-api nestjs-api; do
            (cd "tests/fixtures/$f" && npm install)
          done

      - name: Build scanner (release)
        env:
          CARRICK_API_ENDPOINT: https://api.carrick.tools
        run: cargo build --release

      - name: Run Tier-A scorer
        env:
          CARRICK_API_ENDPOINT: https://api.carrick.tools
          CARRICK_EVAL_RUNS: ${{ inputs.runs }}
          CARRICK_EVAL_CAPTURE: ${{ inputs.capture && '1' || '' }}
        run: cargo test --release --test eval_tier_a -- --test-threads=1 --nocapture

      # Push the run's records to the durable Axiom history (carrick-cloud
      # eval-ingest, evals #8). The scanner binary mints its OIDC token
      # internally and can't share it, so this step mints its own for the same
      # audience the cloud expects. Non-blocking: a failed ingest must never red
      # the eval — the scoring above is the gate, this is just history.
      - name: Push eval records to cloud history
        if: always()
        env:
          CARRICK_API_ENDPOINT: https://api.carrick.tools
        run: |
          set -uo pipefail
          files=$(ls target/eval-runs/run-*.jsonl 2>/dev/null || true)
          if [ -z "$files" ]; then echo "no eval records to push"; exit 0; fi
          oidc=$(curl -sS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https%3A%2F%2Fapi.carrick.tools" \
            | jq -r '.value')
          if [ -z "$oidc" ] || [ "$oidc" = "null" ]; then
            echo "could not mint OIDC token; skipping push"; exit 0
          fi
          for f in $files; do
            code=$(curl -sS -o /tmp/ingest_resp.json -w '%{http_code}' -X POST \
              -H "X-Carrick-OIDC: ${oidc}" \
              -H "Content-Type: application/x-ndjson" \
              --data-binary "@${f}" \
              "${CARRICK_API_ENDPOINT}/eval/ingest" || echo "000")
            echo "POST ${f} -> HTTP ${code}"
            cat /tmp/ingest_resp.json 2>/dev/null || true
            echo
          done

      # Slice 3 / Layer 3: the scorer writes one JSON line per fixture to
      # target/eval-runs/ (the longitudinal store). Keep it as a build artifact so
      # a run's metrics survive the ephemeral runner and can re-pin
      # tests/eval/baseline.jsonl after a release.
      - name: Upload eval run records
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-runs-jsonl
          path: |
            target/eval-runs/*.jsonl
            target/eval-runs/dump/**
          if-no-files-found: warn
